# Что изменено относительно оригинала (под переезд Nexus на repository.transcapital.com):
#   1. keytool -import из многосертификатного PEM брал ТОЛЬКО первый cert (терялся TCB-ENT-CA).
#      Теперь bundle режется awk и каждый сертификат импортируется под своим alias.
#      Затронуто: .maven_runner.before_script и mvn_package.before_script.
#   2. ВАЖНО (не в этом файле): переменную CERT нужно обновить актуальной цепочкой,
#      что реально подписывает repository.transcapital.com. Текущий бандл — 2048-битные
#      TCB-Root-CA (2010, SHA1) + TCB-ENT-CA (2017), а сервер отдаёт подпись 4096 бит
#      (ошибка "Bad signature length: got 512 but was expecting 256"). Забрать корень:
#        echo | openssl s_client -connect repository.transcapital.com:443 \
#          -servername repository.transcapital.com -showcerts
#
# Это REFERENCE-копия в orchestration-репо PAY_ALL. Боевой файл лежит в отдельном
# GitLab-проекте tkbpay/microservices/template — правки переносить туда.

