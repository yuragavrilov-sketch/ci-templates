cache:
  paths:
    - .m2/repository

.runner:template:
  tags:
    - DockerWormHoleGroup

stages:
  - mvn_compile
  - mvn_test
  - mvn_package
  - mvn_deploy
  - docker_build
  - docker_tag
  - helm_deploy
#  - notify_failure

.maven_runner:
  extends: .runner:template
  image:
    name: $JDK_JAVA_IMAGE
  before_script:
    - echo "$CERT" > ca-cert.pem
    # keytool -import из многосертификатного PEM берёт только первый cert (терялся TCB-ENT-CA).
    # Режем bundle на отдельные сертификаты и импортируем каждый под своим alias (busybox-safe awk).
    - |
      awk '/-----BEGIN CERTIFICATE-----/{n++} n{print > ("corp-ca-" n ".crt")}' ca-cert.pem
      for c in corp-ca-*.crt; do
        keytool -keystore "$CA_CERT_PATH" -storepass changeit -noprompt \
                -import -alias "${c%.crt}" -file "$c"
      done
    - keytool -keystore "$CA_CERT_PATH" -storepass changeit -list | grep -i corp-ca || true

.docker_runner:
  extends: .runner:template
  image:
    name: $IMAGE_REGISTRY/library/docker:25.0.3
  services:
    - name: $IMAGE_REGISTRY/library/docker:25.0.3-dind
      alias: "docker"
      command: [ "--tls=false", "--insecure-registry=harbor.online.tkbbank.ru" ]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2

mvn_compile:
  extends: .maven_runner
  stage: mvn_compile
  script:
    - mvn $MAVEN_CLI_OPTS compile

mvn_test:
  extends: .maven_runner
  stage: mvn_test
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  services:
    - name: $IMAGE_REGISTRY/library/docker:25.0.3
      alias: "docker"
      command: ["--tls=false", "--insecure-registry=harbor.online.tkbbank.ru"]
  script:
    - mvn $MAVEN_CLI_OPTS test

mvn_package:
  extends: .maven_runner
  stage: mvn_package
  # only:
  #   - master
  # before_script намеренно НЕ переопределяется — используется родительский из .maven_runner
  # (он импортирует все certs корректно). Раньше здесь был дубль с тем же багом keytool.
  script:
    - echo $REVISION
    - mvn $MAVEN_CLI_OPTS package -Drevision=$REVISION -Dmaven.test.skip=true
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^feature\/.*/ || $CI_COMMIT_BRANCH == "bug/TKBPAY-5679"

mvn_deploy:
  extends: .maven_runner
  stage: mvn_deploy
#  only:
#    - master
  script:
    - mvn $MAVEN_CLI_OPTS deploy -Drevision=$REVISION -Dmaven.test.skip=true
  artifacts:
    paths:
      - deploy
    expire_in: 30 mins
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^feature\/.*/ || $CI_COMMIT_BRANCH == "bug/TKBPAY-5679"

docker_build:
  extends: .docker_runner
  stage: docker_build
  # only:
  #   - master
  dependencies:
    - mvn_deploy
  variables:
    IMAGE_NAME: $IMAGE_REGISTRY/$IMAGE_REGISTRY_PROJECT/$CI_PROJECT_NAME
    IMAGE_TAG: $REVISION-$CI_COMMIT_SHORT_SHA
  before_script:
    - export DOCKER_BUILDKIT=0
    - export COMPOSE_DOCKER_CLI_BUILD=0
    - echo $IMAGE_REGISTRY_PASSWORD | docker login -u $IMAGE_REGISTRY_USERNAME --password-stdin $IMAGE_REGISTRY
    - mkdir -p certs && echo "$CERT" > certs/tkbbank-ca.crt      # корп-CA в рантайм-контекст (Dockerfile COPY certs/)
    - cat certs/tkbbank-ca.crt
  script:
    - export DATE="$(date +%Y%m%d%H%M)"
    - docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:$IMAGE_TAG-$DATE -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:$IMAGE_TAG-$DATE
    #- docker push $IMAGE_NAME:latest
    - docker image rm $IMAGE_NAME:$IMAGE_TAG
    - docker image rm $IMAGE_NAME:$IMAGE_TAG-$DATE
    - docker image rm $IMAGE_NAME:latest
    # docker image don't have curl inside, so we use wget
    # %0A is working TG strings delimiter (\n is not work)
    # %23 is a # in UTF-8
    #- wget -O - --post-data "chat_id=$NOTIFICATION_CHAT_ID&disable_web_page_preview=1&parse_mode=HTML&text=
    #  <b>Build status:</b> ✅
    #  %0A<b>Project:</b> $CI_PROJECT_NAME
    #  %0A<b>Docker image:</b> $IMAGE_NAME:$IMAGE_TAG
    #  %0A<b>URL:</b> $CI_PROJECT_URL/pipelines/$CI_PIPELINE_ID
    #  %0A<b>Branch:</b> $CI_COMMIT_REF_SLUG
    #  %0A<b>Triggered by:</b> $GITLAB_USER_NAME
    #  %0A%0A%23build %23success %23$CI_PROJECT_NAME %23$CI_COMMIT_REF_SLUG"
    #  $NOTIFICATION_URL
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^feature\/.*/ || $CI_COMMIT_BRANCH == "bug/TKBPAY-5679"

docker_tag:
  extends: .docker_runner
  stage: docker_tag
  variables:
    IMAGE_NAME: $IMAGE_REGISTRY/$IMAGE_REGISTRY_PROJECT/$CI_PROJECT_NAME
    IMAGE_TAG: $CI_COMMIT_TAG-$CI_COMMIT_SHORT_SHA
  before_script:
    - export DOCKER_BUILDKIT=0
    - export COMPOSE_DOCKER_CLI_BUILD=0
    - echo $IMAGE_REGISTRY_PASSWORD | docker login -u $IMAGE_REGISTRY_USERNAME --password-stdin $IMAGE_REGISTRY
  script:
    - docker pull $IMAGE_NAME:$IMAGE_TAG
    - docker tag  $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:$CI_COMMIT_TAG
    - docker push $IMAGE_NAME:$CI_COMMIT_TAG
    - docker image rm $IMAGE_NAME:$CI_COMMIT_TAG
    - docker image rm $IMAGE_NAME:$IMAGE_TAG
    #- wget -O - --post-data "chat_id=$NOTIFICATION_CHAT_ID&disable_web_page_preview=1&parse_mode=HTML&text=
    #  <b>Release status:</b> ✅
    #  %0A<b>Project:</b> $CI_PROJECT_NAME
    #  %0A<b>Source docker image:</b> $IMAGE_NAME:$IMAGE_TAG
    #  %0A<b>Target docker image:</b> $IMAGE_NAME:$CI_COMMIT_TAG
    #  %0A<b>URL:</b> $CI_PROJECT_URL/pipelines/$CI_PIPELINE_ID
    #  %0A<b>Tag:</b> $CI_COMMIT_TAG
    #  %0A<b>Triggered by:</b> $GITLAB_USER_NAME
    #  %0A%0A%23release %23success %23$CI_PROJECT_NAME %23$CI_COMMIT_TAG"
    #  $NOTIFICATION_URL
  rules:
    - if: $CI_COMMIT_TAG

helm_deploy:
  extends: .docker_runner
  stage: helm_deploy
  variables:
    IMAGE_NAME: $IMAGE_REGISTRY/$IMAGE_REGISTRY_PROJECT/$CI_PROJECT_NAME
    IMAGE_TAG: $REVISION-$CI_COMMIT_SHORT_SHA
    ENV: preprod
  script:
    - K8S_CONFIG=K8S_CONFIG_${ENV}
    - chmod 0400 $(echo "${!K8S_CONFIG}")
    - export KUBECONFIG=$(echo "${!K8S_CONFIG}")
    - helm repo add kubernetes --insecure-skip-tls-verify=true $CHART_REPO
    - helm upgrade $CI_PROJECT_NAME --install --insecure-skip-tls-verify=true --version=$CHART_VERSION $CHART_NAME --set image.tag=$IMAGE_TAG -f helm/values-$ENV.yaml --namespace=$NAMESPACE
  when: manual
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH =~ /^feature\/.*/ || $CI_COMMIT_BRANCH == "bug/TKBPAY-5679"

