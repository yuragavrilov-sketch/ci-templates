spec:
  inputs:
    release_name:
      description: "Helm release name (DNS-1123, без подчёркиваний)"
    with_cert:
      type: boolean
      default: false
      description: "Подмешивать корпоративный CA в truststore (вариант -withcert)"
    values_path:
      default: "helm/values-test.yaml"
    maven_image:
      default: "harbor.online.tkbbank.ru/library/maven:3.9-eclipse-temurin-21"
    maven_settings_path:
      default: "settings.xml"
      description: "Optional Maven settings path. Used when the file exists in the service repository."
    chart_repo:
      default: "https://harbor.online.tkbbank.ru/chartrepo/kubernetes"
    chart_name:
      default: "kubernetes/java"
    chart_version:
      default: "0.4.0"
    namespace:
      default: "test"
    image_registry:
      default: "harbor.online.tkbbank.ru"
      description: "Docker registry host (Harbor)"
    image_registry_project:
      default: "tkbpay"
      description: "Проект/namespace реестра под образы сервисов"
    corp_ca_enabled:
      type: boolean
      default: true
      description: "Install corporate CA from CORP_CA_CERT/CERT/CERT_NEW into job trust stores."
    kaniko_insecure_skip_tls_verify:
      type: boolean
      default: false
      description: "Emergency fallback only: pass --skip-tls-verify to Kaniko."
    trivy_insecure:
      type: boolean
      default: false
      description: "Emergency fallback only: pass --insecure to Trivy registry access."
    helm_insecure_skip_tls_verify:
      type: boolean
      default: false
      description: "Emergency fallback only: pass --insecure-skip-tls-verify to Helm."
---
include:
  - local: "templates/_deploy.yml"
  # Source-сканы (выполняются в стадии test, блокирующие). Если в self-managed GitLab
  # эти шаблоны/лицензии недоступны — закомментировать (см. предусловие P4 плана).
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

variables:
  # ВНИМАНИЕ: MAVEN_OPTS уходит в JVM, а не в Maven. Флаг `-B` (batch) — это опция Maven,
  # в JVM он даёт "Unrecognized option: -B". Поэтому `-B` только в командной строке `mvn`.
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  IMAGE: "$[[ inputs.image_registry ]]/$[[ inputs.image_registry_project ]]/$CI_PROJECT_NAME"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

stages: [validate, test, package, scan, deploy, smoke]

.mvn_cache: &mvn_cache
  cache:
    key:
      files: ["pom.xml"]
    paths: [".m2/repository"]

.rules_mr_main:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

.corp_ca:
  before_script:
    - &corp_ca_functions |
      append_corp_ca_var() {
        var_name="$1"
        target="$2"
        value="$(printenv "$var_name" 2>/dev/null || true)"
        [ -z "$value" ] && return 0

        if [ -f "$value" ]; then
          cat "$value" >> "$target"
          printf '\n' >> "$target"
          return 0
        fi

        case "$value" in
          *BEGIN*CERTIFICATE*) printf '%s\n' "$value" >> "$target" ;;
          *) printf '%s' "$value" | base64 -d >> "$target"; printf '\n' >> "$target" ;;
        esac
      }

      setup_corp_ca_bundle() {
        target="$1"
        mode="${2:-auto}"
        : > "$target"
        append_corp_ca_var CORP_CA_CERT "$target"
        append_corp_ca_var CERT "$target"
        append_corp_ca_var CERT_NEW "$target"

        if grep -q "BEGIN CERTIFICATE" "$target"; then
          export CORP_CA_BUNDLE="$target"
          return 0
        fi

        export CORP_CA_BUNDLE=""
        if [ "$mode" = "true" ]; then
          echo "ERROR: corporate CA is enabled, but CORP_CA_CERT/CERT/CERT_NEW is empty or invalid" >&2
          return 1
        fi

        echo "WARN: no corporate CA bundle found; continuing without CA injection" >&2
      }

      install_corp_ca_system() {
        bundle="$1"
        [ -n "$bundle" ] || return 0

        if [ -d /usr/local/share/ca-certificates ] && command -v update-ca-certificates >/dev/null 2>&1; then
          cp "$bundle" /usr/local/share/ca-certificates/corp-ca.crt
          update-ca-certificates || true
        fi

        if [ -w /etc/ssl/certs/ca-certificates.crt ]; then
          cat "$bundle" >> /etc/ssl/certs/ca-certificates.crt
        fi
      }

      install_corp_ca_java() {
        bundle="$1"
        [ -n "$bundle" ] || return 0
        command -v keytool >/dev/null 2>&1 || return 0

        java_cacerts="${JAVA_HOME:-}/lib/security/cacerts"
        if [ ! -f "$java_cacerts" ]; then
          java_bin="$(readlink -f "$(command -v java)" 2>/dev/null || true)"
          java_cacerts="$(dirname "$java_bin")/../lib/security/cacerts"
        fi
        [ -f "$java_cacerts" ] || { echo "WARN: Java cacerts not found, skipping JVM CA import" >&2; return 0; }

        split_dir="/tmp/corp-ca-split"
        rm -rf "$split_dir"
        mkdir -p "$split_dir"
        awk -v dir="$split_dir" '/-----BEGIN CERTIFICATE-----/{n++} n{print > (dir "/corp-ca-" n ".crt")}' "$bundle"
        for cert in "$split_dir"/corp-ca-*.crt; do
          [ -f "$cert" ] || continue
          alias_name="$(basename "$cert" .crt)"
          keytool -keystore "$java_cacerts" -storepass changeit -noprompt \
            -importcert -trustcacerts -alias "$alias_name" -file "$cert" \
            || echo "WARN: skipped certificate $cert" >&2
        done
      }

.maven_corp_ca:
  extends: .corp_ca
  before_script:
    - *corp_ca_functions
    - |
      setup_corp_ca_bundle "$CI_PROJECT_DIR/.corp-ca.pem" "$[[ inputs.corp_ca_enabled ]]"
      install_corp_ca_system "$CORP_CA_BUNDLE"
      install_corp_ca_java "$CORP_CA_BUNDLE"

validate:
  stage: validate
  image: $[[ inputs.maven_image ]]
  <<: *mvn_cache
  extends:
    - .rules_mr_main
    - .maven_corp_ca
  script:
    # Базовая компиляция как быстрый гейт. checkstyle:check намеренно НЕ включён: в pom'ах сервисов
    # PAY_ALL нет maven-checkstyle-plugin. Подключить отдельной строкой `mvn checkstyle:check`,
    # когда плагин появится в репозитории.
    - |
      MAVEN_SETTINGS_OPT=""
      if [ -n "$[[ inputs.maven_settings_path ]]" ] && [ -f "$[[ inputs.maven_settings_path ]]" ]; then
        MAVEN_SETTINGS_OPT="-s $[[ inputs.maven_settings_path ]]"
      fi
      mvn -B ${MAVEN_SETTINGS_OPT:+$MAVEN_SETTINGS_OPT} compile

# Валидация Vault-политики (policy-as-code, spec §14). Без привилегированного токена.
# Запускается только если в репо есть vault/policy.hcl.
vault_policy_validate:
  stage: validate
  image: harbor.online.tkbbank.ru/devops/hashicorp/vault:1.18
  rules:
    - exists: ["vault/policy.hcl"]
      if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - exists: ["vault/policy.hcl"]
      if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    # `vault policy fmt` парсит HCL (ловит синтаксис) и форматирует на месте — токен не нужен.
    # Флага `-check` у него нет (это из terraform fmt); невалидный HCL даёт ненулевой код.
    - vault policy fmt vault/policy.hcl

test:
  stage: test
  image: $[[ inputs.maven_image ]]
  <<: *mvn_cache
  extends:
    - .rules_mr_main
    - .maven_corp_ca
  script:
    - |
      MAVEN_SETTINGS_OPT=""
      if [ -n "$[[ inputs.maven_settings_path ]]" ] && [ -f "$[[ inputs.maven_settings_path ]]" ]; then
        MAVEN_SETTINGS_OPT="-s $[[ inputs.maven_settings_path ]]"
      fi
      mvn -B ${MAVEN_SETTINGS_OPT:+$MAVEN_SETTINGS_OPT} verify
  artifacts:
    when: always
    # spring-boot-maven-plugin repackage кладёт boot-jar в deploy/ (см. pom outputDirectory) —
    # именно его COPY'ит Dockerfile (deploy/<svc>-*.jar). package берёт этот артефакт.
    paths: ["deploy/*.jar"]
    reports:
      junit: "target/surefire-reports/TEST-*.xml"

package:
  stage: package
  image:
    name: harbor.online.tkbbank.ru/devops/kaniko-project/executor:debug
    entrypoint: [""]
  # Собираем образ только при изменении того, что на него влияет.
  # Коммит, трогающий только helm/** — сборку не триггерит (см. spec §13).
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: ["Dockerfile", "src/**/*", "pom.xml"]
  script:
    - *corp_ca_functions
    - |
      setup_corp_ca_bundle "$CI_PROJECT_DIR/.corp-ca.pem" "$[[ inputs.corp_ca_enabled ]]"
      if [ -n "$CORP_CA_BUNDLE" ]; then
        mkdir -p /kaniko/ssl/certs
        touch /kaniko/ssl/certs/ca-certificates.crt
        cat "$CORP_CA_BUNDLE" >> /kaniko/ssl/certs/ca-certificates.crt
      fi
    # Авторизация Kaniko в Harbor из переменной HARBOR_DOCKER_CONFIG (GitLab сам подкладывает только
    # DOCKER_AUTH_CONFIG). Robust к формату: File-переменная (путь), сырой JSON ({...) или base64.
    - |
      mkdir -p /kaniko/.docker
      if [ -f "$HARBOR_DOCKER_CONFIG" ]; then
        cp "$HARBOR_DOCKER_CONFIG" /kaniko/.docker/config.json
      else
        case "$HARBOR_DOCKER_CONFIG" in
          \{*) printf '%s' "$HARBOR_DOCKER_CONFIG" > /kaniko/.docker/config.json ;;
          *)   printf '%s' "$HARBOR_DOCKER_CONFIG" | base64 -d > /kaniko/.docker/config.json ;;
        esac
      fi
      # with_cert: Dockerfile делает COPY certs/ и импортит corp CA в runtime truststore.
      # Кладём единый bundle из CORP_CA_CERT/CERT/CERT_NEW в certs/.
      if [ "$[[ inputs.with_cert ]]" = "true" ]; then
        mkdir -p certs
        [ -n "$CORP_CA_BUNDLE" ] || { echo "ERROR: with_cert=true requires CORP_CA_CERT/CERT/CERT_NEW" >&2; exit 1; }
        cp "$CORP_CA_BUNDLE" certs/corp-ca.crt
      fi
    - |
      KANIKO_TLS_FLAGS=""
      if [ "$[[ inputs.kaniko_insecure_skip_tls_verify ]]" = "true" ]; then
        KANIKO_TLS_FLAGS="--skip-tls-verify --skip-tls-verify-pull"
      fi
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        --destination "$IMAGE:$IMAGE_TAG" \
        --cache=true \
        $KANIKO_TLS_FLAGS

container_scan:
  stage: scan
  # Runner должен уметь pull'ить этот job image до старта script (runner-level auth или DOCKER_AUTH_CONFIG).
  # entrypoint: [""] — у образа trivy бинарный entrypoint (`trivy`); без сброса GitLab передаёт
  # шелл-скрипт джобы как аргументы trivy → "unknown command sh".
  image:
    name: harbor.online.tkbbank.ru/devops/pay-trivy-offline:latest
    entrypoint: [""]
  # Сканируем только когда package реально собрал образ (те же changes). Иначе scan тянет
  # несуществующий для этого sha образ.
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: ["Dockerfile", "src/**/*", "pom.xml"]
  # Закрытый контур: используем offline-образ с предзагруженными vuln/Java DB. Пока не блокируем деплой
  # сканом; когда обновление offline-образа станет регулярным и стабильным, снять allow_failure.
  allow_failure: true
  script:
    - *corp_ca_functions
    # Harbor приватный + внутренний CA: креды из HARBOR_DOCKER_CONFIG (pull) + corp CA в trust store.
    # `trivy_insecure=true` оставлен только как аварийный fallback.
    - |
      setup_corp_ca_bundle "$CI_PROJECT_DIR/.corp-ca.pem" "$[[ inputs.corp_ca_enabled ]]"
      install_corp_ca_system "$CORP_CA_BUNDLE"

      mkdir -p "$HOME/.docker"
      if [ -f "$HARBOR_DOCKER_CONFIG" ]; then
        cp "$HARBOR_DOCKER_CONFIG" "$HOME/.docker/config.json"
      else
        case "$HARBOR_DOCKER_CONFIG" in
          \{*) printf '%s' "$HARBOR_DOCKER_CONFIG" > "$HOME/.docker/config.json" ;;
          *)   printf '%s' "$HARBOR_DOCKER_CONFIG" | base64 -d > "$HOME/.docker/config.json" ;;
        esac
      fi
    # Offline-образ хранит БД в дефолтном /root/.cache/trivy. Не задаём TRIVY_CACHE_DIR для него,
    # иначе Trivy будет искать БД в пустой рабочей директории и упадёт на skip-db-update.
    - |
      TRIVY_TLS_FLAGS=""
      if [ "$[[ inputs.trivy_insecure ]]" = "true" ]; then
        TRIVY_TLS_FLAGS="--insecure"
      fi

      trivy image --scanners vuln --timeout 20m --exit-code 1 --severity HIGH,CRITICAL \
        --no-progress $TRIVY_TLS_FLAGS "$IMAGE:$IMAGE_TAG"

deploy_test:
  stage: deploy
  extends: .helm_deploy
  variables:
    ENV: test
    RELEASE_NAME: "$[[ inputs.release_name ]]"
    CHART_REPO: "$[[ inputs.chart_repo ]]"
    CHART_NAME: "$[[ inputs.chart_name ]]"
    CHART_VERSION: "$[[ inputs.chart_version ]]"
    NAMESPACE: "$[[ inputs.namespace ]]"
    VALUES_PATH: "$[[ inputs.values_path ]]"
    CORP_CA_ENABLED: "$[[ inputs.corp_ca_enabled ]]"
    HELM_INSECURE_SKIP_TLS_VERIFY: "$[[ inputs.helm_insecure_skip_tls_verify ]]"
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# Перевыкатка указанного образа / применение новых values без сборки (spec §13).
# Триггерится через «Run pipeline» с переменной DEPLOY_IMAGE_TAG=<sha>:
# validate/test/package/scan не матчатся → пропускаются, выполняется только helm upgrade.
deploy_only:
  stage: deploy
  extends: .helm_deploy
  variables:
    ENV: test
    RELEASE_NAME: "$[[ inputs.release_name ]]"
    CHART_REPO: "$[[ inputs.chart_repo ]]"
    CHART_NAME: "$[[ inputs.chart_name ]]"
    CHART_VERSION: "$[[ inputs.chart_version ]]"
    NAMESPACE: "$[[ inputs.namespace ]]"
    VALUES_PATH: "$[[ inputs.values_path ]]"
    IMAGE_TAG: "$DEPLOY_IMAGE_TAG"
    CORP_CA_ENABLED: "$[[ inputs.corp_ca_enabled ]]"
    HELM_INSECURE_SKIP_TLS_VERIFY: "$[[ inputs.helm_insecure_skip_tls_verify ]]"
  rules:
    - if: '$DEPLOY_IMAGE_TAG'

# Применение Vault-политики/роли — централизованно (spec §14). Эта джоба токена НЕ держит:
# она лишь триггерит привилегированный downstream-пайплайн vault-config, который клонирует
# репо сервиса и делает `vault policy write` + `vault write auth/kubernetes/role/...`.
vault_apply:
  stage: deploy
  trigger:
    project: tkbpay/vault-config
    branch: main
    strategy: depend
  variables:
    TARGET_APP: "$CI_PROJECT_NAME"
    TARGET_ENV: test
    TARGET_REF: "$CI_COMMIT_SHA"
    TARGET_REPO_URL: "$CI_PROJECT_URL.git"
  when: manual
  rules:
    - exists: ["vault/policy.hcl"]
      if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

smoke_test:
  stage: smoke
  extends: .smoke
  variables:
    ENV: test
    RELEASE_NAME: "$[[ inputs.release_name ]]"
    NAMESPACE: "$[[ inputs.namespace ]]"
    CORP_CA_ENABLED: "$[[ inputs.corp_ca_enabled ]]"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
